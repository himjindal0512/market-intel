name: Daily Market Scan
on:
  schedule:
    - cron: '30 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r requirements.txt
      - run: python volume_scan.py --backfill
      - run: python build_site.py
      - name: Save results
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add volume_alerts.json docs/ || true
          git commit -m "📊 Daily scan $(date +%Y-%m-%d)" || true
          git push || true
